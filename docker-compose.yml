services:
  postgres:
    image: postgres:16-alpine
    container_name: careconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: careconnect
      POSTGRES_PASSWORD: careconnect
      POSTGRES_DB: careconnect
    ports:
      - "5432:5432"
    volumes:
      - careconnect_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careconnect -d careconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  careconnect_pg_data:
